name: JntuhConnect
options:
  bundleIdPrefix: com.dhethi
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  JntuhConnect:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    sources:
      - path: JntuhConnect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dhethi.jntuhconnect.ios
        DEVELOPMENT_TEAM: CJYZD3579U
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: JntuhConnect/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    scheme:
      testTargets:
        - JntuhConnectTests
        - JntuhConnectUITests
  JntuhConnectTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JntuhConnectTests
    dependencies:
      - target: JntuhConnect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dhethi.jntuhconnect.ios.tests
        GENERATE_INFOPLIST_FILE: YES
  JntuhConnectUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JntuhConnectUITests
    dependencies:
      - target: JntuhConnect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dhethi.jntuhconnect.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: JntuhConnect
